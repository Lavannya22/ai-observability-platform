pipeline:
  services:
    - database
    - metadata
    - etl
    - analytics
    - reporting

  # "depends_on" edges: child depends on parent
  # database <- metadata <- etl <- analytics <- reporting
  dependencies:
    metadata: database
    etl: metadata
    analytics: etl
    reporting: analytics

paths:
  scenarios: scenarios/scenarios.json
  ground_truth: scenarios/ground_truth.json
  raw_logs: data/raw_logs
  processed_logs: data/processed_logs
  incidents: data/incidents

log_generator:
  seed: 42                   # ensures determinism
  normal_logs_per_service: 20
  error_logs_per_service: 15  # injected per affected service
  log_levels: [INFO, WARNING, ERROR]

detection:
  error_threshold: 5         # min ERROR logs in a window to trigger incident
  window_size: 50            # number of recent logs to evaluate

clustering:
  similarity_threshold: 0.3  # cosine similarity cutoff to merge into same cluster
  max_features: 500          # TF-IDF vocabulary size

evaluation:
  top_k: 3                   # evaluate RCA accuracy at rank k

kafka:
  topic: logs
  bootstrap_servers: localhost:29092

postgres:
  host: localhost
  port: 5432
  database: observability
  user: trading
  password: trading

incident:
  timeout_seconds: 600
  merge_window_minutes: 10

opensearch:
  host: localhost
  port: 9200
  index: incidents
  embedding_dim: 384
  top_k: 5

rag:
  model: claude-haiku-4-5-20251001
  max_tokens: 512
